name: GSC report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: Report type to run
        required: true
        default: weekly
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - auto
  schedule:
    # Sunday 12:00 Asia/Shanghai.
    - cron: "0 4 * * 0"
    # Monthly report for the previous calendar month at 09:00 Asia/Shanghai on day 3.
    - cron: "0 1 3 * *"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Choose report type
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            report_type="${{ inputs.report_type }}"
            should_run="true"
          elif [ "${{ github.event.schedule }}" = "0 4 * * 0" ]; then
            report_type="weekly"
            should_run="true"
          else
            report_type="monthly"
            should_run="true"
          fi

          echo "report_type=${report_type}" >> "$GITHUB_OUTPUT"
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "Report type: ${report_type}; should_run: ${should_run}"

      - name: Checkout
        if: steps.plan.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.plan.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.plan.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare runtime config and secrets
        if: steps.plan.outputs.should_run == 'true'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_TECH_AT_ID: ${{ vars.FEISHU_TECH_AT_ID || '' }}
          FEISHU_TECH_AT_NAME: ${{ vars.FEISHU_TECH_AT_NAME || '叶国钰' }}
          FEISHU_OPS_AT_ID: ${{ vars.FEISHU_OPS_AT_ID || '' }}
          FEISHU_OPS_AT_NAME: ${{ vars.FEISHU_OPS_AT_NAME || '谢佳丽' }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          GSC_CLIENT_SECRET_JSON: ${{ secrets.GSC_CLIENT_SECRET_JSON }}
          GSC_CLIENT_SECRET_JSON_B64: ${{ secrets.GSC_CLIENT_SECRET_JSON_B64 }}
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GSC_TOKEN_JSON_B64: ${{ secrets.GSC_TOKEN_JSON_B64 }}
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
          GA4_TOKEN_JSON_B64: ${{ secrets.GA4_TOKEN_JSON_B64 }}
        run: |
          cp config.github.py config.py
          python scripts/prepare_github_secrets.py

      - name: Run report
        if: steps.plan.outputs.should_run == 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://thermalmaster.com/' }}
          DATA_DELAY_DAYS: ${{ vars.DATA_DELAY_DAYS || '3' }}
          GSC_SEARCH_TYPE: ${{ vars.GSC_SEARCH_TYPE || 'web' }}
          GSC_API_PAGE_SIZE: ${{ vars.GSC_API_PAGE_SIZE || '25000' }}
          QUERY_PAGE_LIMIT: ${{ vars.QUERY_PAGE_LIMIT || '2000' }}
          COUNTRY_DEVICE_LIMIT: ${{ vars.COUNTRY_DEVICE_LIMIT || '1000' }}
          SEARCH_APPEARANCE_LIMIT: ${{ vars.SEARCH_APPEARANCE_LIMIT || '1000' }}
          BITABLE_TOP_QUERIES: ${{ vars.BITABLE_TOP_QUERIES || '100' }}
          BITABLE_TOP_PAGES: ${{ vars.BITABLE_TOP_PAGES || '100' }}
          SEO_OPPORTUNITY_LIMIT: ${{ vars.SEO_OPPORTUNITY_LIMIT || '12' }}
          TARGET_KEYWORD_LIMIT: ${{ vars.TARGET_KEYWORD_LIMIT || '20' }}
          TARGET_KEYWORD_TERMS: ${{ vars.TARGET_KEYWORD_TERMS || '' }}
          EXCLUDED_TARGET_KEYWORDS: ${{ vars.EXCLUDED_TARGET_KEYWORDS || '' }}
          EXCLUDED_EXACT_KEYWORDS: ${{ vars.EXCLUDED_EXACT_KEYWORDS || '' }}
          BRAND_TERMS: ${{ vars.BRAND_TERMS || '' }}
          BRAND_PRODUCT_TERMS: ${{ vars.BRAND_PRODUCT_TERMS || '' }}
          CORE_COUNTRIES: ${{ vars.CORE_COUNTRIES || '' }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_TECH_AT_ID: ${{ vars.FEISHU_TECH_AT_ID || '' }}
          FEISHU_TECH_AT_NAME: ${{ vars.FEISHU_TECH_AT_NAME || '叶国钰' }}
          FEISHU_OPS_AT_ID: ${{ vars.FEISHU_OPS_AT_ID || '' }}
          FEISHU_OPS_AT_NAME: ${{ vars.FEISHU_OPS_AT_NAME || '谢佳丽' }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          GA4_ENABLED: ${{ vars.GA4_ENABLED || 'false' }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          report_type="${{ steps.plan.outputs.report_type }}"

          if [ "${report_type}" = "auto" ]; then
            python main.py --auto
          else
            python main.py --type "${report_type}"
          fi

      - name: Upload generated reports
        if: always() && steps.plan.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gsc-reports
          path: reports/
          if-no-files-found: ignore
